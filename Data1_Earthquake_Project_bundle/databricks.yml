# This is a Databricks asset bundle definition for Data1_Project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Data1_Earthquake_Project_bundle
  uuid: c8dae63b-0ac5-48e6-981c-a5beab8fb288

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: WarehouseID

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-a21855d2-df58.cloud.databricks.com
    variables:
      catalog: data1_earthquake_dev
      schema: dev
      warehouse_id: a74eac2be54a626f

    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-a21855d2-df58.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/usamapatel340@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Data1_Earthquake_Project
    variables:
      catalog: data1_earthquake_prod
      schema: prod
      warehouse_id: a74eac2be54a626f
    permissions:
      - user_name: usamapatel340@gmail.com
        level: CAN_MANAGE
