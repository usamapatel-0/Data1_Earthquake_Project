resources:
  jobs:
    Data1_Earthquake_End_End_Job:
      name: Data1_Earthquake_End_End_Job
      tasks:
        - task_key: Ingestion_Bronze
          notebook_task:
            notebook_path: ../src/notebook/ingestion_bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver_Earthquake
          depends_on:
            - task_key: Ingestion_Bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_silver_earthquake_etl.id}
        - depends_on:
            - task_key: Bronze_Silver_Earthquake
          pipeline_task:
            pipeline_id: aa3ee994-a3c7-4415-b8f7-fac402687597
          task_key: Silver_Gold_Earthquake
        - dashboard_task:
            dashboard_id: 01f17a9c73961e03962fc5a0f58caffd
            subscription: {}
          depends_on:
            - task_key: Silver_Gold_Earthquake
          task_key: Earthquake_Dashboard
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
